<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="supported-color-schemes" content="light dark">
    <style>
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #0f172a !important;
            }

            .email-container {
                background-color: #1e293b !important;
                border-color: #334155 !important;
            }

            .text-title {
                color: #f8fafc !important;
            }

            .text-body {
                color: #cbd5e1 !important;
            }

            .text-muted {
                color: #94a3b8 !important;
            }

            .article-border {
                border-bottom-color: #334155 !important;
            }

            .accent-link {
                color: #f97316 !important;
            }

            .accent-border {
                border-bottom-color: #f97316 !important;
            }

            .footer-text {
                color: #64748b !important;
            }
        }
    </style>
</head>

<body
    style="font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f3; margin: 0; padding: 20px;">
    <div class="email-container"
        style="max-width: 750px; margin: auto; background-color: #fcfbfa; padding: 30px; border-radius: 16px; border: 1px solid #e7e5e4; box-shadow: 0 4px 20px -2px rgba(28,25,23,0.05); transition: all 0.3s ease;">

        <!-- HEADER_START -->
        <h2 class="text-title accent-border"
            style="color: #1c1917; border-bottom: 2px solid #e05600; padding-bottom: 12px; margin-top: 0; font-size: 24px; font-weight: 500; letter-spacing: -0.02em;">
            Goedemorgen Divyashri! ☕</h2>
        <p class="text-muted" style="color: #44403c; font-size: 15px; margin-bottom: 25px;">Hier is het technieuws van
            vandaag uit Nederland:</p>
        <!-- HEADER_END -->

        <!-- ARTICLES_PLACEHOLDER -->

        <!-- FOOTER_START -->
        <p class="footer-text"
            style="font-size: 11px; color: #a8a29e; text-align: center; margin-top: 30px; letter-spacing: 0.02em;">
            Gegenereerd door de Python News Bot.
        </p>
        <!-- FOOTER_END -->

    </div>
</body>

</html>
